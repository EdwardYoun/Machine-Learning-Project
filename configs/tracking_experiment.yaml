# Legacy reference config kept for comparison only.
# The final project results use `configs/motion_value_v2_final.yaml`.
project_name: "reading-the-defense-tracking"

paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  artifacts_dir: "artifacts"

data:
  pbp_seasons: [2023, 2024]
  ftn_seasons: [2023, 2024]
  use_ftn_charting: true
  season_type: "REG"

tracking:
  enabled: true
  input_globs:
    - "train/input_*.csv"
  input_files:
    - "test_input.csv"
  cache_file: "tracking_play_features_2023_2024_v2.parquet"

experiment:
  mode: "balanced_research"
  enable_motion_effect_analysis: true
  enable_defensive_response_analysis: true
  feature_sets:
    - context_only
    - context_plus_motion
    - full

split:
  strategy: "explicit"
  train_seasons: [2023]
  validation_seasons: []
  test_seasons: [2024]

targets:
  classification_targets:
    - success
    - explosive
    - completion
  regression_targets:
    - epa
  explosive_threshold: 20

models:
  classification_models:
    - logistic_regression
    - random_forest
  regression_models:
    - ridge_regression
    - random_forest
  random_state: 42

evaluation:
  classification_threshold: 0.5
  calibration_bins: 10
  motion_effect_control_columns:
    - down_bucket
    - distance_bucket
    - field_zone
    - score_state
  motion_effect_minimum_size: 50
  defensive_response_minimum_size: 25
  sparse_tracking_threshold: 0.25
  subgroup_columns:
    - down_bucket
    - distance_bucket
    - field_zone
    - pressure_bucket
    - score_state
    - qb_location
    - starting_hash
    - box_bucket
  minimum_subgroup_size: 25
